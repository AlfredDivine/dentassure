<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DentAssure · Risk Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream:   #F5F0E8;
    --ink:     #1A1612;
    --gold:    #B8924A;
    --gold-lt: #D4AA6E;
    --muted:   #7A7066;
    --border:  #DDD5C8;
    --low:     #2D6A4F;
    --med:     #E07A1F;
    --high:    #C0392B;
    --card:    #FFFDF9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    background: var(--card);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--gold); font-style: italic; }
  .tagline {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: start;
  }
  @media (max-width: 800px) {
    .container { grid-template-columns: 1fr; }
    header { padding: 1.5rem; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 2.5rem;
  }
  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
  }
  .panel-sub {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .field-group { margin-bottom: 1.4rem; }
  .field-group label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 0.75rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus { border-color: var(--gold); }
  .field-group textarea { resize: vertical; min-height: 80px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .check-group { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.4rem; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    cursor: pointer;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--border);
    background: var(--cream);
    transition: all 0.15s;
  }
  .check-item input { width: auto; accent-color: var(--gold); }
  .check-item:has(input:checked) { border-color: var(--gold); background: #FFF8EE; }

  .btn {
    width: 100%;
    padding: 1rem;
    background: var(--ink);
    color: var(--cream);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--gold); }
  .btn:disabled { background: var(--muted); cursor: not-allowed; }

  #result { display: none; }

  .risk-badge {
    display: inline-block;
    padding: 0.3rem 1.2rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .risk-LOW    { background: #E8F5EE; color: var(--low);  border: 1px solid var(--low); }
  .risk-MEDIUM { background: #FEF3E2; color: var(--med);  border: 1px solid var(--med); }
  .risk-HIGH   { background: #FDEDEC; color: var(--high); border: 1px solid var(--high); }

  .result-summary {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    line-height: 1.7;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .factors-title {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }
  .factor-item {
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
    margin-bottom: 0.6rem;
    font-size: 0.78rem;
    line-height: 1.5;
  }
  .factor-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    margin-top: 0.45rem;
    flex-shrink: 0;
  }

  .records-section { grid-column: 1 / -1; }
  .records-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
  }
  .refresh-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  thead tr { border-bottom: 2px solid var(--ink); }
  th {
    text-align: left;
    padding: 0.6rem 0.8rem;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }
  td { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: #FFF8EE; }

  .pill {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 99px;
  }
  .pill-LOW    { background: #E8F5EE; color: var(--low); }
  .pill-MEDIUM { background: #FEF3E2; color: var(--med); }
  .pill-HIGH   { background: #FDEDEC; color: var(--high); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    background: var(--card);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">Dent<span>Assure</span></div>
  <div class="tagline">UK Dental Indemnity · Risk Intelligence Platform</div>
</header>

<div class="container">

  <!-- FORM PANEL -->
  <div class="panel" id="form-panel">
    <div class="panel-title">New Lead Assessment</div>
    <div class="panel-sub">Complete all fields for accurate AI risk classification</div>

    <div class="field-row">
      <div class="field-group">
        <label>Full Name *</label>
        <input type="text" id="full_name" placeholder="Dr. Jane Smith"/>
      </div>
      <div class="field-group">
        <label>Email Address *</label>
        <input type="email" id="email" placeholder="jane@practice.co.uk"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+44 7700 000000"/>
      </div>
      <div class="field-group">
        <label>Practice Name</label>
        <input type="text" id="practice_name" placeholder="Smile Dental Practice"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Years Since Qualification *</label>
        <input type="number" id="years_qualified" placeholder="e.g. 12" min="0" max="60"/>
      </div>
      <div class="field-group">
        <label>Number of Dentists *</label>
        <input type="number" id="num_dentists" placeholder="e.g. 3" min="1"/>
      </div>
    </div>

    <div class="field-group">
      <label>Specialisms / Treatments Offered</label>
      <div class="check-group">
        <label class="check-item"><input type="checkbox" value="General Dentistry"/> General Dentistry</label>
        <label class="check-item"><input type="checkbox" value="Orthodontics"/> Orthodontics</label>
        <label class="check-item"><input type="checkbox" value="Implants"/> Implants</label>
        <label class="check-item"><input type="checkbox" value="Oral Surgery"/> Oral Surgery</label>
        <label class="check-item"><input type="checkbox" value="Cosmetic"/> Cosmetic</label>
        <label class="check-item"><input type="checkbox" value="Endodontics"/> Endodontics</label>
        <label class="check-item"><input type="checkbox" value="Periodontics"/> Periodontics</label>
        <label class="check-item"><input type="checkbox" value="Paediatric"/> Paediatric</label>
        <label class="check-item"><input type="checkbox" value="Sedation"/> Sedation</label>
      </div>
    </div>

    <div class="field-group">
      <label>Previous Claims in Last 5 Years? *</label>
      <select id="prev_claims">
        <option value="">— Select —</option>
        <option value="None">None</option>
        <option value="1">1 claim</option>
        <option value="2">2 claims</option>
        <option value="3+">3 or more claims</option>
      </select>
    </div>

    <div class="field-group">
      <label>Claim Details (if any)</label>
      <textarea id="claim_details" placeholder="Briefly describe any previous claims or complaints..."></textarea>
    </div>

    <button class="btn" id="submit-btn" onclick="submitForm()">
      Run Risk Assessment
    </button>
  </div>

  <!-- RESULT PANEL -->
  <div class="panel" id="result">
    <div class="panel-title">Risk Assessment Result</div>
    <div class="panel-sub" id="result-meta">—</div>
    <div id="risk-badge-wrap"></div>
    <div class="result-summary" id="result-summary"></div>
    <div class="factors-title">Contributing Risk Factors</div>
    <div id="risk-factors"></div>
    <button class="btn" style="margin-top:2rem" onclick="resetForm()">New Assessment</button>
  </div>

</div>

<!-- RECORDS TABLE -->
<div class="container">
  <div class="records-section panel">
    <div class="records-header">
      <div>
        <div class="panel-title">All Leads</div>
        <div class="panel-sub" style="margin-bottom:0;border:none;padding:0;">Stored assessments database</div>
      </div>
      <button class="refresh-btn" onclick="loadLeads()">↻ Refresh</button>
    </div>
    <div id="leads-table-wrap">
      <div class="empty-state">Loading records...</div>
    </div>
  </div>
</div>

<script>
// Groq API key injected from .env via Django settings
const API_KEY = "{{ api_key }}";

async function classifyRisk(fd) {
  const prompt = `You are an expert UK dental indemnity insurance underwriter.
Classify the risk level of this dental practice lead as exactly one of: LOW, MEDIUM, or HIGH.

Lead Data:
- Name: ${fd.full_name}
- Practice: ${fd.practice_name || 'Not specified'}
- Years Qualified: ${fd.years_qualified}
- Number of Dentists: ${fd.num_dentists}
- Specialisms: ${fd.specialisms || 'Not specified'}
- Previous Claims (5 yrs): ${fd.prev_claims}
- Claim Details: ${fd.claim_details || 'None'}

Respond ONLY with a JSON object (no markdown, no extra text):
{
  "risk_level": "LOW" | "MEDIUM" | "HIGH",
  "summary": "2-3 sentence plain English summary of the risk assessment",
  "factors": ["factor 1", "factor 2", "factor 3"]
}`;

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      max_tokens: 400,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!res.ok) { const e = await res.json(); throw new Error("AI API error: " + JSON.stringify(e)); }
  const data = await res.json();
  const text = data.choices[0].message.content.trim();
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

async function submitForm() {
  const btn = document.getElementById("submit-btn");

  const full_name      = document.getElementById("full_name").value.trim();
  const email          = document.getElementById("email").value.trim();
  const years_qualified = document.getElementById("years_qualified").value;
  const num_dentists   = document.getElementById("num_dentists").value;
  const prev_claims    = document.getElementById("prev_claims").value;

  if (!full_name || !email || !years_qualified || !num_dentists || !prev_claims) {
    alert("Please fill in all required (*) fields.");
    return;
  }

  const specialisms = Array.from(document.querySelectorAll(".check-item input:checked"))
    .map(c => c.value).join(", ");

  const fd = {
    full_name, email,
    phone:         document.getElementById("phone").value.trim(),
    practice_name: document.getElementById("practice_name").value.trim(),
    years_qualified: parseInt(years_qualified),
    num_dentists:    parseInt(num_dentists),
    specialisms, prev_claims,
    claim_details: document.getElementById("claim_details").value.trim()
  };

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analysing Risk...';

  try {
    const ai = await classifyRisk(fd);
    fd.risk_level   = ai.risk_level;
    fd.risk_summary = ai.summary;
    fd.risk_factors = ai.factors;

    // Django CSRF token
    const csrf = getCookie('csrftoken');
    const saveRes = await fetch("/api/leads", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrf
      },
      body: JSON.stringify(fd)
    });
    const saved = await saveRes.json();

    showResult(ai, full_name, saved.id);
    loadLeads();
  } catch(err) {
    alert("Error: " + err.message);
    btn.disabled = false;
    btn.innerHTML = "Run Risk Assessment";
  }
}

function showResult(ai, name, id) {
  document.getElementById("result-meta").textContent =
    `Lead #${id} · ${name} · ${new Date().toLocaleString('en-GB')}`;
  document.getElementById("risk-badge-wrap").innerHTML =
    `<div class="risk-badge risk-${ai.risk_level}">${ai.risk_level} Risk</div>`;
  document.getElementById("result-summary").textContent = ai.summary;
  document.getElementById("risk-factors").innerHTML =
    ai.factors.map(f => `<div class="factor-item"><div class="factor-dot"></div><span>${f}</span></div>`).join('');
  document.getElementById("result").style.display = "block";
  document.getElementById("form-panel").style.display = "none";
}

function resetForm() {
  document.getElementById("result").style.display = "none";
  document.getElementById("form-panel").style.display = "block";
  document.getElementById("submit-btn").disabled = false;
  document.getElementById("submit-btn").innerHTML = "Run Risk Assessment";
  document.querySelectorAll("input:not([type=checkbox])").forEach(i => i.value = "");
  document.querySelectorAll("textarea, select").forEach(i => i.value = "");
  document.querySelectorAll(".check-item input").forEach(i => i.checked = false);
}

async function loadLeads() {
  const wrap = document.getElementById("leads-table-wrap");
  try {
    const res = await fetch("/api/leads/");
    const leads = await res.json();
    if (!leads.length) {
      wrap.innerHTML = '<div class="empty-state">No assessments yet. Submit your first lead above.</div>';
      return;
    }
    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Practice</th><th>Specialisms</th>
            <th>Claims</th><th>Risk</th><th>Summary</th><th>Date</th>
          </tr>
        </thead>
        <tbody>
          ${leads.map(l => `
            <tr>
              <td>${l.id}</td>
              <td>${l.full_name}<br><span style="color:var(--muted);font-size:0.65rem">${l.email}</span></td>
              <td>${l.practice_name || '—'}</td>
              <td style="font-size:0.68rem">${l.specialisms || '—'}</td>
              <td>${l.prev_claims}</td>
              <td><span class="pill pill-${l.risk_level}">${l.risk_level}</span></td>
              <td style="font-size:0.7rem;max-width:220px">${l.risk_summary || '—'}</td>
              <td style="font-size:0.65rem;color:var(--muted)">${l.created_at}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch {
    wrap.innerHTML = '<div class="empty-state">Could not load records.</div>';
  }
}

function getCookie(name) {
  const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
  return v ? v[2] : null;
}

loadLeads();
</script>
</body>
</html>
